

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Rubik+Burned&display=swap');
    body{
        display:grid;
    }
    body h1{
        position: relative;
        top:15px;
        display: flex;
        justify-content: center;
    }
    #info_city{
        width: 315px;
        display:flex;
        flex-direction:column;
        justify-self:center;
        border: 1px solid;
        background-image: url('https://th.bing.com/th/id/R.82fcc205a108d306d5b682727f1bccef?rik=gib7z5cBiEGXqQ&riu=http%3a%2f%2fmedia3.giphy.com%2fmedia%2fjtavDv8iqstY4%2fgiphy.gif&ehk=aKTzi3J7qddDEuvU8gb8p9jlYBDTqWcwoUPysJnV0Ro%3d&risl=&pid=ImgRaw&r=0');
        background-size: 175px 200px;
        border-radius:5px;
        box-shadow:3px 4px 10px, -3px 4px 10px;
    }
    #info_prev{
        width: 100%;
        justify-items:end;
        display: flex;
        position: fixed;
        right:-75%;
        top:34%;
    }
    body form{
        width: 100%;
        display:flex;
        position: fixed;
        justify-content: center;
    }
    #info_city img{
        position:fixed;
        margin-left:250px;
    }
    #info_city input{
        display: flex;
        width: 98.5%;
        justify-content: center;
        text-align: center;
        font-size: 25px;
        outline: none;
        border:none;
        margin:10px 0px;
        background-color: unset;
        
        font-family: "Caveat", serif;
    }
    #info_city label{
        display: flex;
        justify-content: center;
        text-align:center;
        width: 100%;
        font-size:25px;
        font-family: "Caveat", serif;
        font-weight: 700
        px;
    }
    form input{
        width:75%;
    }
    form button img{
        width: 20px;
    }
    #info_prev span{
        border: 1px solid;
        display: flex;
        align-items:center;
        flex-direction: column;
        position:fixed;
        right:5px;
        
    }
    #info_prev span input{
        text-align: center;
    }

    </style>
    
</head>
<body>
    <h1>{{city}} {{region}}</h1>
    <form action="{%url 'home0'%}" enctype="multipart/form-data" method="POST">{%csrf_token%}
        <input name="cidade_input" type="text" placeholder="Insira a Cidade Aqui...">
        <button><img src="https://www.svgrepo.com/show/450490/search.svg"></button>
    </form>

    <section id="info_city">
        <input id='temp' type="text" value='{{temperatura}}' readonly='true'>
        <label id="label_temp" for="temp">Temperatura</label>
        
        <input id='humidity' type="text" value='{{humidity}}' readonly='true'>
        <label id="label_humidity" for="humidity">Umidade</label>

        <input id='windchill' type="text" value='{{windchill}}' readonly='true'>
        <label id="label_windchill" for="windchill">Sensação Termica</label>
        
        <input id='probabilidade' type="text" value='{{preci_probabilidade}}' readonly='true'>
        <label id="label_probabilidade" for="windchill">Probabilidade de Chuva</label>
        
        <input id='tmp_max' type="text" value='{{tmp_max}}' readonly='true'>
        <label id="label_max" for="windchill">Máxima</label>
        
        <input id='tmp_min' type="text" value='{{tmp_min}}' readonly='true'>
        <label id="label_min" for="windchill">Mínima</label>
        <img src="{{icon_ref}}">
    </section>
    <section id="info_prev" style="display: none;">
        <span style="display: flex;">
            <p>{{data0}}</p>
            <input id='max_tmp0' type="text" value="{{tmp_max0}}" readonly="true">
            <label for="max_tmp0">Máxima</label>
            <input id='min_tmp0' type="text" value="{{tmp_min0}}" readonly="true">
            <label for="min_tmp0">Mínima</label>
            <input id='humidity_prev0' type="text" value="{{humidity_prev0}}" readonly="true">
            <label id='label_humidity_prev0' for="humidity_prev">Umidade</label>
            <input id='preci_prev0' type="text" value="{{preci_prev0}}" readonly="true">
            <label id="label_prec_prev0" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp0}}">
        </span>
        <span style="display: none;">
            <p>{{data1}}</p>
            <input id='max_tmp1' type="text" value="{{tmp_max1}}" readonly="true">
            <label for="max_tmp1">Máxima</label>
            <input id='min_tmp1' type="text" value="{{tmp_min1}}" readonly="true">
            <label for="min_tmp1">Mínima</label>
            <input id='humidity_prev1' type="text" value="{{humidity_prev1}}" readonly="true">
            <label id='label_humidity_prev1' for="humidity_prev">Umidade</label>
            <input id='preci_prev1' type="text" value="{{preci_prev1}}" readonly="true">
            <label id="label_prec_prev1" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp1}}">
        </span>
        <span style="display: none;">
            <p>{{data2}}</p>
            <input id='max_tmp2' type="text" value="{{tmp_max2}}" readonly="true">
            <label for="max_tmp2">Máxima</label>
            <input id='min_tmp2' type="text" value="{{tmp_min2}}" readonly="true">
            <label for="min_tmp2">Mínima</label>
            <input id='humidity_prev2' type="text" value="{{humidity_prev2}}" readonly="true">
            <label id='label_humidity_prev2' for="humidity_prev">Umidade</label>
            <input id='preci_prev2' type="text" value="{{preci_prev2}}" readonly="true">
            <label id="label_prec_prev2" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp2}}">
        </span>
        <span style="display: none;">
            <p>{{data3}}</p>
            <input id='max_tmp3' type="text" value="{{tmp_max3}}" readonly="true">
            <label for="max_tmp3">Máxima</label>
            <input id='min_tmp3' type="text" value="{{tmp_min3}}" readonly="true">
            <label for="min_tmp3">Mínima</label>
            <input id='humidity_prev3' type="text" value="{{humidity_prev3}}" readonly="true">
            <label id='label_humidity_prev3' for="humidity_prev">Umidade</label>
            <input id='preci_prev3' type="text" value="{{preci_prev3}}" readonly="true">
            <label id="label_prec_prev3" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp3}}">
        </span>
        <span style="display: none;">
            <p>{{data4}}</p>
            <input id='max_tmp4' type="text" value="{{tmp_max4}}" readonly="true">
            <label for="max_tmp4">Máxima</label>
            <input id='min_tmp4' type="text" value="{{tmp_min4}}" readonly="true">
            <label for="min_tmp4">Mínima</label>
            <input id='humidity_prev4' type="text" value="{{humidity_prev4}}" readonly="true">
            <label id='label_humidity_prev4' for="humidity_prev">Umidade</label>
            <input id='preci_prev4' type="text" value="{{preci_prev4}}" readonly="true">
            <label id="label_prec_prev4" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp4}}">
        </span>
        <span style="display: none;">
            <p>{{data5}}</p>
            <input id='max_tmp5' type="text" value="{{tmp_max5}}" readonly="true">
            <label for="max_tmp5">Máxima</label>
            <input id='min_tmp5' type="text" value="{{tmp_min5}}" readonly="true">
            <label for="min_tmp5">Mínima</label>
            <input id='humidity_prev5' type="text" value="{{humidity_prev5}}" readonly="true">
            <label id='label_humidity_prev5' for="humidity_prev">Umidade</label>
            <input id='preci_prev5' type="text" value="{{preci_prev5}}" readonly="true">
            <label id="label_prec_prev5" for="prec_prev" >Probabilidade de Chuva</label>
            <img src="{{icon_tmp5}}">
        </span>
    </section>
    <a id='button_grafico' style="display: none;" href="{%url 'grafico'%}">Previsão em Grafico</a>
<script> 
    function animar_slide(valor){
        document.querySelectorAll('#info_prev span')[valor].animate([{right:'5px', opacity:'100%'},{right:'65px', opacity:'0%'}],{duration:500})
        setTimeout(function(){document.querySelectorAll('#info_prev span')[valor].style.display='none'},490)
    }
    function animar_slide0(valor0){
        document.querySelectorAll('#info_prev span')[valor0].style.display='flex'
        document.querySelectorAll('#info_prev span')[valor0].animate([{right:'-200px'},{right:'5px'}],{duration:500})
        
    }
    if(window.location.reload){
        if(document.querySelector('#humidity').value!=''){
            document.querySelector('#button_grafico').style.display='block'
            document.querySelector('#info_prev').style.display='block'
        }
    }
    for(a=0;a<document.querySelectorAll('#info_city input').length;a++){
        document.querySelectorAll('#info_city label')[a].style.pointerEvents='none'
        document.querySelectorAll('#info_city input')[a].style.pointerEvents='none'
    }
    for(b=0;b<document.querySelectorAll('#info_prev span input').length;b++){
        document.querySelectorAll('#info_prev span input')[b].style.pointerEvents='none'
    }
    
    for(c=0;c<document.querySelector('#info_prev span').length;c++){
        document.querySelectorAll('#info_prev span')[c].style.zIndex='0'
        document.querySelectorAll('#info_prev span')[c].style.right='0px'
    }
    valor=0
    setInterval(function(){
        animar_slide(valor)
        if(valor<7){
            valor=valor+1
        }
        if(valor>=6){
            valor=0
        }
        setTimeout(function(){
        animar_slide0(valor)},1000)
        console.log(valor)
    },5000)
</script>
</body>
</html>
